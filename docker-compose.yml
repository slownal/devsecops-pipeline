version: '3.8'

services:
  db:
    image: postgres:15
    container_name: devsecops-postgres
    restart: always
    environment:
      POSTGRES_USER: goparth
      POSTGRES_PASSWORD: goparth
      POSTGRES_DB: devsecops
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  sonarqube:
    image: sonarqube:lts-community
    container_name: devsecops-sonarqube
    restart: always
    ports:
      - "9000:9000"
    environment:
      - SONAR_JDBC_URL=jdbc:postgresql://db:5432/sonarqube
      - SONAR_JDBC_USERNAME=goparth
      - SONAR_JDBC_PASSWORD=goparth
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_logs:/opt/sonarqube/logs
    depends_on:
      - db

  ml-service:
    build: 
      context: ./ml-service
      dockerfile: Dockerfile
    container_name: devsecops-ml-service
    restart: always
    ports:
      - "8001:8001"
    environment:
      - USE_REAL_MODEL=false

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: devsecops-backend
    restart: always
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://goparth:goparth@db:5432/devsecops
      - ML_SERVICE_URL=http://ml-service:8001
      - SONARQUBE_URL=http://sonarqube:9000
    depends_on:
      - db
      - ml-service
      - sonarqube

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: devsecops-frontend
    restart: always
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  pgdata:
  sonarqube_data:
  sonarqube_logs:
